<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Things I Love About You ❤️</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(to bottom,#ffd6e7,#fff5fa);
    font-family:'Trebuchet MS',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:20px;
    max-width:700px;
    z-index:2;
}

h1{
    color:#ff4f87;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

.jar{
    font-size:120px;
    cursor:pointer;
    transition:transform .3s;
}

.jar:hover{
    transform:scale(1.1) rotate(5deg);
}

.note{
    margin-top:25px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    font-size:22px;
    color:#444;
    min-height:60px;
    animation:pop .4s ease;
}

.counter{
    margin-top:15px;
    color:#888;
}

@keyframes pop{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.heart{
    position:absolute;
    bottom:-20px;
    animation:float 8s linear infinite;
    opacity:.5;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>
</head>

<body>

<div class="container">

<h1>100 Things I Love About You ❤️</h1>

<div class="subtitle">
Click the love jar whenever you need a reminder 💌
</div>

<div class="jar" onclick="getLoveNote()">
🫙
</div>

<div class="note" id="note">
Your note will appear here ✨
</div>

<div class="counter" id="counter">
0 notes opened
</div>

</div>

<script>

const notes = [

"I love hearing your voice.",
"I love how you make me laugh.",
"I love how patient you are with me.",
"I love how excited you get about things.",
"I love the way you care.",
"I love talking to you every day.",
"I love your sense of humor.",
"I love how supportive you are.",
"I love how safe you make me feel.",
"I love your smile.",
"I love your kindness.",
"I love how thoughtful you are.",
"I love how you always listen.",
"I love how you remember little things.",
"I love your determination.",
"I love your honesty.",
"I love your energy.",
"I love your creativity.",
"I love how genuine you are.",
"I love your curiosity."

];

// Add more notes until you reach 100+

let remaining = [...notes];
let opened = 0;

function getLoveNote(){

    if(remaining.length === 0){
        remaining = [...notes];
    }

    const randomIndex =
        Math.floor(Math.random() * remaining.length);

    const chosen =
        remaining[randomIndex];

    remaining.splice(randomIndex,1);

    opened++;

    document.getElementById("note").innerHTML =
        "💌<br><br>" + chosen;

    document.getElementById("counter").innerHTML =
        opened + " notes opened";
}

function createHeart(){

    const heart = document.createElement("div");

    heart.innerHTML = "❤️";

    heart.classList.add("heart");

    heart.style.left =
        Math.random()*100 + "vw";

    heart.style.fontSize =
        (15 + Math.random()*25) + "px";

    heart.style.animationDuration =
        (5 + Math.random()*6) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },11000);
}

setInterval(createHeart,700);

</script>

</body>
